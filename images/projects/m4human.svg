    <circle cx="86" cy="112" r="8"/>
    <circle cx="38" cy="146" r="8"/>
    <circle cx="138" cy="148" r="8"/>
    <circle cx="54" cy="210" r="8"/>
    <circle cx="116" cy="210" r="8"/>
    <circle cx="44" cy="254" r="8"/>
    <circle cx="132" cy="256" r="8"/>
  </g>
  <g fill="#ffffff" font-family="Arial, Helvetica, sans-serif">
    <text x="54" y="78" font-size="20" font-weight="700" opacity="0.84">DATASET / BENCHMARK</text>
    <text x="54" y="360" font-size="56" font-weight="700">M4Human</text>
    <text x="54" y="402" font-size="24" opacity="0.88">mmWave radar + multimodal human mesh reconstruction</text>
