<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-labelledby="title desc">
  <title id="title">M4Human project visual</title>
  <desc id="desc">Stylized radar rings and human mesh figure on a purple to cyan gradient background.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#31155a"/>
      <stop offset="55%" stop-color="#1c5b86"/>
      <stop offset="100%" stop-color="#79d2e2"/>
    </linearGradient>
    <linearGradient id="mesh" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7d8ff"/>
      <stop offset="100%" stop-color="#fefefe"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" rx="36" fill="url(#bg)"/>
  <g opacity="0.18" fill="none" stroke="#ffffff">
