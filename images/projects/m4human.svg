    <circle cx="148" cy="190" r="6"/>
    <circle cx="240" cy="172" r="6"/>
    <circle cx="255" cy="272" r="7"/>
    <circle cx="132" cy="308" r="6"/>
  </g>
  <g transform="translate(458 78)" fill="none" stroke="url(#mesh)" stroke-linecap="round" stroke-width="8">
    <circle cx="86" cy="54" r="28"/>
    <path d="M86 86 L86 174"/>
    <path d="M86 110 L38 146"/>
    <path d="M86 110 L138 148"/>
    <path d="M86 176 L44 254"/>
    <path d="M86 176 L132 256"/>
