    <rect x="160" y="120" width="118" height="70" rx="18" opacity="0.88"/>
  </g>
  <g fill="#153c54" font-family="Arial, Helvetica, sans-serif" font-weight="700">
    <text x="604" y="122" font-size="18">UWB</text>
    <text x="604" y="148" font-size="20">Anchors</text>
    <text x="186" y="148" font-size="18">Robot</text>
    <text x="186" y="174" font-size="18">Path</text>
  </g>
  <g fill="#ffffff" font-family="Arial, Helvetica, sans-serif">
    <text x="54" y="78" font-size="20" font-weight="700" opacity="0.84">LOCALIZATION</text>
    <text x="54" y="360" font-size="56" font-weight="700">ULoc</text>
    <text x="54" y="402" font-size="24" opacity="0.88">learning to localize with ultra-wideband ranging</text>
