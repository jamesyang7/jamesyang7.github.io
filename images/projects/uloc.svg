<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-labelledby="title desc">
  <title id="title">ULoc project visual</title>
  <desc id="desc">Stylized localization map with anchors, path lines, and ranging circles.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#143c5d"/>
      <stop offset="55%" stop-color="#1f7d8c"/>
      <stop offset="100%" stop-color="#84d5ba"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" rx="36" fill="url(#bg)"/>
  <g opacity="0.1" stroke="#ffffff">
    <path d="M0 96 H800"/>
    <path d="M0 192 H800"/>
    <path d="M0 288 H800"/>
    <path d="M0 384 H800"/>
    <path d="M160 0 V480"/>
    <path d="M320 0 V480"/>
    <path d="M480 0 V480"/>
    <path d="M640 0 V480"/>
  </g>
  <g fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M122 322 L232 238 L332 272 L458 162 L612 212"/>
  </g>
  <g fill="#ffffff">
    <circle cx="122" cy="322" r="10"/>
    <circle cx="232" cy="238" r="10"/>
    <circle cx="332" cy="272" r="10"/>
    <circle cx="458" cy="162" r="10"/>
    <circle cx="612" cy="212" r="10"/>
  </g>
  <g fill="none" stroke="#d8fff2" opacity="0.42" stroke-width="5">
    <circle cx="458" cy="162" r="44"/>
    <circle cx="458" cy="162" r="78"/>
    <circle cx="458" cy="162" r="114"/>
